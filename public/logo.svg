<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MedhaHub">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect width="512" height="512" rx="108" fill="none"
        stroke="rgba(255,255,255,0.09)" stroke-width="2"/>

  <!-- Subtle noise texture dots (4 corners) -->
  <circle cx="80"  cy="80"  r="3" fill="white" opacity="0.05"/>
  <circle cx="432" cy="80"  r="3" fill="white" opacity="0.05"/>
  <circle cx="80"  cy="432" r="3" fill="white" opacity="0.05"/>
  <circle cx="432" cy="432" r="3" fill="white" opacity="0.05"/>

  <!-- Glow halo behind spark dot -->
  <circle cx="256" cy="112" r="52" fill="url(#glow-grad)"/>

  <!-- Bold M lettermark (solid filled path) -->
  <!-- Left bar: 108-160, Right bar: 352-404, Valley: center y=290 outer / y=342 inner -->
  <path d="M108,408 L108,140 L256,290 L404,140 L404,408
           L352,408 L352,178 L256,342 L160,178 L160,408 Z"
        fill="white"/>

  <!-- Orange spark dot (top-center, above the M) -->
  <circle cx="256" cy="108" r="30" fill="url(#spark)" filter="url(#soft-glow)"/>
  <!-- White inner core -->
  <circle cx="256" cy="108" r="13" fill="white" opacity="0.95"/>
</svg>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a2e4a"/>
      <stop offset="100%" stop-color="#0f1f36"/>
    </linearGradient>
    <linearGradient id="flame" x1="256" y1="60" x2="256" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#e8850c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Flame -->
  <path d="M256 62 C256 62 224 116 224 148 C224 166 238 180 256 180 C274 180 288 166 288 148 C288 116 256 62 256 62Z" fill="url(#flame)"/>
  <path d="M256 92 C256 92 242 126 242 144 C242 152 248 158 256 158 C264 158 270 152 270 144 C270 126 256 92 256 92Z" fill="#fff" opacity="0.45"/>
  <!-- Open book -->
  <path d="M206 172 L256 194 L306 172 L306 186 L256 208 L206 186Z" fill="url(#flame)" opacity="0.7"/>
  <!-- Bengali মে -->
  <text x="256" y="380" text-anchor="middle" font-family="'Noto Sans Bengali','Hind Siliguri','Kalpurush',sans-serif" font-size="210" font-weight="700" fill="#ffffff">মে</text>
  <!-- Accent bar -->
  <rect x="156" y="414" width="200" height="5" rx="2.5" fill="url(#flame)" opacity="0.55"/>
</svg>
